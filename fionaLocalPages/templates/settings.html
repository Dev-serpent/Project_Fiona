<!-- settings.html — Unified Settings Page Template -->
<div class="settings-page" style="display: grid; grid-template-columns: 220px 1fr; height: 100%; gap: 0;">
  <style>
    .settings-form {
      max-width: 640px;
    }
    .settings-nav__item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      width: 100%;
      padding: 9px var(--space-4);
      border: none;
      background: none;
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
      cursor: pointer;
      text-align: left;
      transition: all var(--transition-fast);
    }
    .settings-nav__item:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
    }
    .settings-nav__item--active {
      background: var(--accent-muted);
      color: var(--accent);
      font-weight: var(--font-weight-medium);
    }
    .settings-nav__icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Section action bar styling */
    .settings-section__actions {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .settings-section__save-btn {
      transition: all var(--transition-fast);
    }

    .settings-section__save-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .settings-section__dirty-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--warning);
      display: inline-block;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>

  <!-- Left Nav -->
  <div class="settings-nav" style="border-right: 1px solid var(--border); overflow-y: auto; padding: 0; display: flex; flex-direction: column;">
    {{{navContent}}}
  </div>

  <!-- Right Content -->
  <div class="settings-content" style="overflow-y: auto; padding: var(--space-6);">
    {{{contentHtml}}}
  </div>
</div>
