<!-- phiconnect.html — PhiConnect Secure Messaging Template -->
<!-- ============================================================
     Status bar — shows connection state, device ID, fingerprint
     ============================================================ -->
<div class="phc-status-bar" style="margin-bottom: var(--space-4);">
  <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--space-3);">
    <div style="display: flex; align-items: center; gap: var(--space-3);">
      <h1 style="font-size: var(--font-size-xxl); font-weight: var(--font-weight-bold); color: var(--text-primary); margin: 0;">
        PhiConnect
      </h1>
      <span style="display: flex; align-items: center; gap: var(--space-1); font-size: var(--font-size-xs); color: var(--text-muted);">
        <span style="width: 10px; height: 10px; border-radius: 50%;
                     background: {{#if statusReady}}var(--success){{else}}var(--danger){{/if}};
                     flex-shrink: 0;"></span>
        {{#if statusReady}}Ready{{else}}Not Ready{{/if}}
      </span>
      {{#if hasPeers}}
      <span style="font-size: var(--font-size-xxs); color: var(--text-muted); background: var(--bg-tertiary); padding: 2px 8px; border-radius: var(--radius-sm);">
        {{peersCount}} peers
      </span>
      {{/if}}
    </div>
    <div style="display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap;">
      <label style="display: flex; align-items: center; gap: var(--space-1); font-size: var(--font-size-xxs); color: var(--text-muted); cursor: pointer; user-select: none;">
        <input type="checkbox" id="phc-auto-refresh" {{#if autoRefresh}}checked{{/if}}
               style="accent-color: var(--accent); cursor: pointer; width: 14px; height: 14px;">
        Auto-refresh
      </label>
      <button class="c-btn c-btn--sm c-btn--ghost" id="phc-refresh-btn" title="Refresh all data">
        <span class="c-btn__icon">{{{refreshIcon}}}</span>
      </button>
    </div>
  </div>

  <!-- Device identity row -->
  {{#if hasDeviceId}}
  <div style="display: flex; align-items: center; gap: var(--space-3); margin-top: var(--space-2); flex-wrap: wrap;">
    <span style="font-size: var(--font-size-xxs); color: var(--text-muted); font-family: var(--font-mono);">
      {{deviceId}}
    </span>
    {{#if hasFingerprint}}
    <span style="font-size: var(--font-size-xxs); color: var(--text-muted); font-family: var(--font-mono);">
      {{fingerprint}}
    </span>
    <button class="c-btn c-btn--xs c-btn--ghost" id="phc-copy-fp-btn"
            style="font-size: var(--font-size-xxs); display: flex; align-items: center; gap: 4px;">
      <span style="width: 12px; height: 12px; display: flex; align-items: center; justify-content: center;">{{{copyIcon}}}</span>
      {{#if copyFeedback}}Copied!{{else}}Copy{{/if}}
    </button>
    {{/if}}
  </div>
  {{/if}}
</div>

<!-- ============================================================
     Tab Navigation
     ============================================================ -->
<div class="phc-tabs" style="display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: var(--space-4);">
  <button class="phc-tab c-btn c-btn--sm c-btn--primary" data-tab="messages"
          style="border-radius: 0; border-bottom: 2px solid var(--accent); display: flex; align-items: center; gap: 4px;">
    <span style="width: 14px; height: 14px; display: flex; align-items: center; justify-content: center;">{{{messageIcon}}}</span>
    Messages
    {{#if hasMessages}}<span class="c-badge c-badge--default" style="font-size: 10px; padding: 0 6px;">{{messagesCount}}</span>{{/if}}
  </button>
  <button class="phc-tab c-btn c-btn--sm c-btn--ghost" data-tab="contacts"
          style="border-radius: 0; border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 4px;">
    <span style="width: 14px; height: 14px; display: flex; align-items: center; justify-content: center;">{{{contactsIcon}}}</span>
    Contacts
    {{#if hasPeers}}<span class="c-badge c-badge--default" style="font-size: 10px; padding: 0 6px;">{{peersCount}}</span>{{/if}}
  </button>
  <button class="phc-tab c-btn c-btn--sm c-btn--ghost" data-tab="trust"
          style="border-radius: 0; border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 4px;">
    <span style="width: 14px; height: 14px; display: flex; align-items: center; justify-content: center;">{{{trustIcon}}}</span>
    Trust
  </button>
  <button class="phc-tab c-btn c-btn--sm c-btn--ghost" data-tab="config"
          style="border-radius: 0; border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 4px;">
    <span style="width: 14px; height: 14px; display: flex; align-items: center; justify-content: center;">{{{configIcon}}}</span>
    Config
  </button>
</div>

<!-- ============================================================
     Tab Content Area
     ============================================================ -->
<div id="phc-tab-content">
  {{{tabContent}}}
</div>

<!-- ============================================================
     Modal Overlay (hidden by default)
     ============================================================ -->
<div id="phc-modal-overlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
     background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center;">
  <div style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
       padding: var(--space-5); max-width: 480px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.2);">
    <div id="phc-modal-body"></div>
  </div>
</div>
