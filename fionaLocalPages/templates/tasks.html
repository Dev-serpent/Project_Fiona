<!-- tasks.html — Task Queue / Kanban Page Template -->
<style>
  .task-column-body {
    flex: 1;
    padding: var(--space-2);
    overflow-y: auto;
    scrollbar-width: thin;
    min-height: 100px;
  }
  .task-card {
    padding: var(--space-3);
    margin-bottom: var(--space-2);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    cursor: grab;
    transition: all var(--transition-fast);
  }
  .task-card:active {
    cursor: grabbing;
  }
  .task-card--overdue {
    border-left: 3px solid var(--danger) !important;
  }
  .task-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-3);
    align-items: center;
    margin-bottom: var(--space-4);
    padding: var(--space-3);
    background: var(--surface-raised);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
  }
  .task-toolbar__group {
    display: flex;
    align-items: center;
    gap: var(--space-2);
  }
  .task-toolbar__label {
    font-size: var(--font-size-xs);
    color: var(--text-muted);
    white-space: nowrap;
  }
  .task-toolbar select {
    height: 30px;
    font-size: var(--font-size-xs);
    padding: 0 var(--space-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text-primary);
    cursor: pointer;
  }
  .task-progress-bar {
    width: 100%;
    height: 4px;
    background: var(--border-subtle);
    border-radius: 2px;
    overflow: hidden;
    margin: var(--space-1) 0;
  }
  .task-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width var(--transition-normal);
  }
  .category-badge {
    display: inline-block;
    font-size: 9px;
    padding: 1px 6px;
    border-radius: var(--radius-sm);
    font-weight: var(--font-weight-medium);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    white-space: nowrap;
    line-height: 1.5;
  }
  .tag-badge {
    display: inline-block;
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 999px;
    white-space: nowrap;
    line-height: 1.5;
  }
  .overdue-text {
    color: var(--danger) !important;
    font-weight: var(--font-weight-medium);
  }
  .subtask-item {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-1) 0;
    font-size: var(--font-size-sm);
  }
  .subtask-item input[type="checkbox"] {
    cursor: pointer;
    accent-color: var(--accent);
  }
  .subtask-item--done {
    text-decoration: line-through;
    color: var(--text-muted);
  }
  .progress-slider {
    width: 100%;
    accent-color: var(--accent);
    cursor: pointer;
  }
</style>

<!-- Page Header -->
<div style="margin-bottom: var(--space-5);">
  <div style="display: flex; align-items: center; justify-content: space-between;">
    <div>
      <h1 style="font-size: var(--font-size-xxl); font-weight: var(--font-weight-bold); color: var(--text-primary); margin: 0;">
        Task Queue
      </h1>
      <p style="font-size: var(--font-size-sm); color: var(--text-muted); margin: 2px 0 0 0;">
        {{taskCount}} total task{{taskPlural}}
      </p>
    </div>
    <button class="c-btn c-btn--primary c-btn--sm" id="btn-new-task">
      <span class="c-btn__icon">{{{plusIcon}}}</span>
      New Task
    </button>
  </div>
</div>

<!-- Search Bar -->
<div style="position: relative; margin-bottom: var(--space-4); max-width: 360px;">
  <span style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); display: flex; color: var(--text-muted); width: 16px; height: 16px; pointer-events: none;">
    {{{searchIcon}}}
  </span>
  <input type="text" class="c-input" id="tasks-search-input"
         placeholder="Search tasks…"
         value="{{searchQuery}}"
         style="padding-left: 32px; height: 34px;"
         autocomplete="off" />
</div>

<!-- Toolbar (sort / filter) -->
{{{toolbarContent}}}

<!-- Kanban Columns -->
<div id="tasks-kanban" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4); min-height: 400px;">
  {{{kanbanContent}}}
</div>
