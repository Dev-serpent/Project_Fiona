<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0f111a" />
  <meta name="application-name" content="Fiona" />
  <meta name="description" content="Fiona — Desktop-class automation and AI agent frontend" />

  <!-- Preconnect to Google Fonts for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Google Fonts: Inter + JetBrains Mono -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        media="print"
        onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  </noscript>

  <!-- Application Stylesheets (loaded in dependency order) -->
  <link rel="stylesheet" href="css/globals.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />

  <!-- Preload critical assets -->
  <link rel="preload" href="css/globals.css" as="style" />
  <link rel="preload" href="js/app.js" as="script" />

  <title>Fiona</title>
</head>
<body>

  <!-- ═════════════════════════════════════════════════════════════════════
       #app — Root application mount point
       The JS app bootstrapper (app.js) takes over from here.
       ═════════════════════════════════════════════════════════════════════ -->
  <div id="app">

    <!-- ─── App Header ──────────────────────────────────────────────── -->
    <header class="app-header" role="banner">
      <div class="app-header__left">
        <!-- Sidebar toggle (visible when sidebar is collapsed) -->
        <button class="c-btn c-btn--icon c-btn--ghost sidebar-toggle"
                aria-label="Toggle sidebar"
                data-action="toggle-sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>

        <!-- Breadcrumb navigation -->
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <span class="breadcrumb__item breadcrumb__item--current" id="breadcrumb-current">
            Dashboard
          </span>
        </nav>
      </div>

      <div class="app-header__center">
        <!-- Quick search trigger (⌘K) -->
        <button class="search-trigger" id="search-trigger"
                aria-label="Open command palette"
                data-action="open-command-palette">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <span>Quick actions…</span>
          <span class="search-trigger__kbd">
            <kbd>⌘</kbd><kbd>K</kbd>
          </span>
        </button>
      </div>

      <div class="app-header__right">
        <!-- Connection indicator -->
        <div class="connection-indicator connection-indicator--disconnected"
             id="connection-indicator"
             role="status"
             aria-live="polite"
             title="Connection status">
          <span class="connection-indicator__dot"></span>
          <span class="connection-indicator__label">Disconnected</span>
        </div>

        <!-- Quick actions -->
        <button class="c-btn c-btn--icon c-btn--ghost"
                aria-label="Notifications"
                data-action="open-notifications"
                id="header-notifications-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
        </button>

        <button class="c-btn c-btn--icon c-btn--ghost"
                aria-label="Settings"
                data-action="open-settings"
                id="header-settings-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
      </div>
    </header>

    <!-- ─── App Main (sidebar + content + right panel) ──────────────── -->
    <main class="app-main" id="app-main" role="main">

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
        <!-- Sidebar Header -->
        <div class="sidebar__header">
          <div class="sidebar__logo">
            <span class="sidebar__logo-icon">F</span>
            <span>Fiona</span>
          </div>
          <button class="sidebar__collapse-btn" id="sidebar-collapse-btn"
                  aria-label="Collapse sidebar"
                  data-action="collapse-sidebar"
                  title="Collapse sidebar (⌘B)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
              <line x1="9" y1="3" x2="9" y2="21" />
            </svg>
          </button>
        </div>

        <!-- Sidebar Navigation -->
        <nav class="sidebar__nav" id="sidebar-nav" aria-label="Page navigation">
          <!-- Nav sections are populated by JS -->
          <div id="sidebar-nav-content"></div>
        </nav>

        <!-- Sidebar Footer -->
        <div class="sidebar__footer">
          <span class="sidebar__footer-version" id="sidebar-version">v0.1.0</span>
          <div class="sidebar__footer-actions">
            <button class="sidebar__footer-btn" aria-label="Help"
                    data-action="open-help" title="Help">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round"
                   stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                <line x1="12" y1="17" x2="12.01" y2="17" />
              </svg>
            </button>
            <button class="sidebar__footer-btn" aria-label="Settings"
                    data-action="open-settings" title="Settings">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round"
                   stroke-linejoin="round">
                <circle cx="12" cy="12" r="3" />
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
              </svg>
            </button>
          </div>
        </div>
      </aside>

      <!-- Content Area (page content renders here) -->
      <section class="content-area" id="content-area">
        <!-- Page-level header (title + actions) — populated by JS -->
        <div class="content-area__header" id="page-header">
          <h1 class="content-area__title" id="page-title">Dashboard</h1>
          <div class="content-area__actions" id="page-actions"></div>
        </div>

        <!-- Page body — dynamic content mounts here -->
        <div class="content-area__body" id="page-content">
          <!-- Initial loading state — replaced by JS on first route -->
          <div class="empty-state" id="initial-loading">
            <div class="empty-state__icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                   stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                <path d="M2 17l10 5 10-5" />
                <path d="M2 12l10 5 10-5" />
              </svg>
            </div>
            <div class="empty-state__title">Loading Fiona…</div>
            <div class="empty-state__description">
              Connecting to the backend server. Please wait…
            </div>
            <div class="c-spinner c-spinner--lg c-spinner--accent" style="margin-top: var(--space-4);">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" stroke-dasharray="31.4 31.4"
                        stroke-dashoffset="10" />
              </svg>
            </div>
          </div>
        </div>
      </section>

      <!-- Right Panel (collapsible context panel) -->
      <aside class="right-panel right-panel--hidden" id="right-panel"
             aria-label="Context panel">
        <div class="panel__header">
          <span class="panel__title" id="panel-title">Details</span>
          <button class="panel__close" id="panel-close-btn"
                  aria-label="Close panel"
                  data-action="close-panel">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <!-- Panel tabs (optional) -->
        <div class="panel__tabs" id="panel-tabs">
          <button class="panel__tab panel__tab--active" data-panel-tab="properties">
            Properties
          </button>
          <button class="panel__tab" data-panel-tab="info">
            Info
          </button>
        </div>
        <!-- Panel content — dynamic -->
        <div class="panel__content" id="panel-content">
          <div class="empty-state">
            <div class="empty-state__description">Select an item to view details</div>
          </div>
        </div>
        <!-- Panel footer (optional actions) -->
        <div class="panel__footer" id="panel-footer"></div>
      </aside>

    </main>

    <!-- ─── Status Bar ───────────────────────────────────────────────── -->
    <footer class="status-bar" id="status-bar" role="status">
      <div class="status-bar__left">
        <span class="status-bar__item" id="status-message">
          Ready
        </span>
      </div>
      <div class="status-bar__center">
        <span class="status-bar__item status-bar__item--interactive"
              id="status-module" title="Active module">
          Dashboard
        </span>
        <span class="status-bar__separator" aria-hidden="true"></span>
        <span class="status-bar__item" id="status-connection">
          Disconnected
        </span>
      </div>
      <div class="status-bar__right">
        <span class="status-bar__item status-bar__item--interactive"
              id="status-notifications" title="Notifications"
              data-action="open-notifications">
          <span class="status-bar__icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
          </span>
          <span id="status-notification-count">0</span>
        </span>
        <span class="status-bar__separator" aria-hidden="true"></span>
        <span class="status-bar__item" id="status-clock">--:-- --</span>
      </div>
    </footer>

  </div><!-- /#app -->

  <!-- ─── Overlay Containers ────────────────────────────────────────────── -->

  <!-- Notification / Toast container -->
  <div class="c-toast-container" id="toast-container"
       role="alert" aria-live="polite" aria-atomic="true">
  </div>

  <!-- Modal container — modals are rendered here -->
  <div id="modal-container"></div>

  <!-- Context menu container -->
  <div id="context-menu-container"></div>

  <!-- Command palette container -->
  <div id="command-palette-container"></div>

  <!-- Tooltip container -->
  <div id="tooltip-container"></div>

  <!-- ─── Scripts ──────────────────────────────────────────────────────── -->
  <!--
    Module Loading Strategy:
    Only js/app.js is loaded as the entry point. All other JS modules
    (state.js, api.js, router.js, utils.js, persist.js, components/)
    are imported by app.js via ES module import statements. This ensures
    proper load ordering, singleton instances, and a clean dependency graph.

    Page modules (pages/*.js) are lazy-loaded by the router on demand.
  -->

  <script type="module" src="js/app.js"></script>

  <!-- Inline script to set initial theme and prevent FOUC -->
  <script>
    (function() {
      // Apply dark theme immediately to prevent flash
      document.documentElement.style.colorScheme = 'dark';
      // Restore sidebar state from localStorage
      try {
        var sidebarCollapsed = localStorage.getItem('fiona_sidebar_collapsed');
        if (sidebarCollapsed === 'true') {
          document.getElementById('app-main').classList.add('app-main--sidebar-collapsed');
        }
      } catch(e) { /* ignore */ }
    })();
  </script>

</body>
</html>
