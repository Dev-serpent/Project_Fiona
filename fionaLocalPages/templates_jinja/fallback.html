{% extends "base.html" %}

{% block title %}Fiona — {{ page_title }}{% endblock %}

{% block content %}
<div class="empty-state" style="margin-top: 10vh;">
  <div class="empty-state__icon" style="color: var(--text-muted);">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="16" x2="12" y2="12"/>
      <line x1="12" y1="8" x2="12.01" y2="8"/>
    </svg>
  </div>
  <div class="empty-state__title" style="margin-top: var(--space-3);">
    {{ page_title }}
  </div>
  <div class="empty-state__description" style="max-width: 400px; margin: var(--space-2) auto 0;">
    This page has not been migrated yet. Use the sidebar navigation to explore available pages.
  </div>
  <p style="margin-top: var(--space-4); font-size: var(--font-size-xs); color: var(--text-muted);">
    <a href="/" style="color: var(--accent);">Return to Dashboard</a>
  </p>
</div>
{% endblock %}
